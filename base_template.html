<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Collaboration Network</title>
<!--
  BASE TEMPLATE — Research Collaboration Network (institution-agnostic)
  =======================================================================
  This is the outer shell: header + tab nav + lazy-loaded iframe pages,
  styled to closely mirror the live Academic Analytics portal's own
  homepage layout (navy bar with centered institution name, white nav
  row below). Built to be reused across institutions long-term — edit
  ONLY the CONFIG object in the <script> block below (institution name,
  product label, release tag, and page tabs) to stand up a new instance.
  Nothing else should need to change.

  Each page (details_table.html, matrix_viz.html, etc.) is its own fully
  self-contained HTML file — copy the DESIGN TOKENS block below into any new
  page's <style> so every page stays visually consistent with this shell and
  with the live portal (source: design_reference.md).

  DESIGN TOKENS (pulled from portal.academicanalytics.com, 2026-07-01):
    --navy:    #254467   top nav / header background
    --ink:     #052448   heading / dark text
    --bg:      #f7f7f7   page background
    --card:    #ffffff   card background
    --text:    #212529   body text
    --accent:  #0066b4   links / accent / active-tab underline
    --line:    #e2e5ea   card borders / dividers
    Fonts: body "Open Sans", sans-serif | headings "Crimson Text", serif

  Logo note: the "Academic Analytics" mark is the icon graphic (cropped
  tight to its own bounding box, so it renders complete at any size)
  paired with live HTML text — not a baked-in bitmap wordmark.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#254467; --ink:#052448; --bg:#f7f7f7; --card:#ffffff;
  --text:#212529; --accent:#0066b4; --line:#e2e5ea;
}
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;
     font:14px/1.4 'Open Sans',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
     color:var(--text);background:var(--bg)}

/* top identity bar — mirrors the portal's navy header exactly:
   logo far left, institution name centered, product tag far right */
header.topbar{position:relative;display:flex;align-items:center;background:var(--navy);
    color:#fff;height:52px;flex:0 0 52px;padding:0 20px}
.logo-mark{display:flex;align-items:center;gap:9px;flex-shrink:0;z-index:1}
.logo-mark img{display:block;height:26px;width:auto}
.logo-text{font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:.01em;color:#fff;white-space:nowrap}
.institution-name{position:absolute;left:0;right:0;text-align:center;
    font-family:'Open Sans',sans-serif;font-size:16px;font-weight:600;color:#fff;
    letter-spacing:.01em;pointer-events:none}
.topbar-spacer{flex:1}
.product-tag{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:rgba(255,255,255,.9);white-space:nowrap;z-index:1}
.release-tag{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;
    border-left:1px solid rgba(255,255,255,.25);margin-left:10px;padding-left:10px;z-index:1}

/* sub-nav — mirrors the portal's white global-nav row (Benchmarking / Medical
   Insight / Research Insight / ...): normal case, underline-on-active */
nav.subnav{display:flex;align-items:center;background:#fff;flex:0 0 44px;height:44px;
    padding:0 24px;border-bottom:1px solid var(--line);gap:26px}
.tab{font:14px/1 'Open Sans',inherit;font-weight:600;border:0;background:transparent;
     color:#5a6a80;padding:0;height:100%;cursor:pointer;white-space:nowrap;
     border-bottom:3px solid transparent;margin-bottom:-1px;
     transition:color .12s,border-color .12s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);border-bottom-color:var(--accent)}

.frames{flex:1;position:relative;min-height:0;background:var(--bg)}
iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.hidden{display:none}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
         background:var(--bg);color:#5a6a8a;font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--navy);
      border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
/* ============== CONFIG — edit this block per institution, nothing else ============== */
const CONFIG = {
  institution: "Massachusetts Institute of Technology",
  product: "Collaborations",
  release: "AAD2024-2904",
  defaultTab: "key",
  tabs: [
    { id: "key",      label: "Key",      src: "key.html" },
    { id: "details",  label: "Details",  src: "details_table.html" },
    { id: "matrix",   label: "Matrix",   src: "matrix_viz.html" },
    { id: "network",  label: "Network",  src: "network_viz.html" },
    { id: "chord",    label: "Chord",    src: "chord_viz.html" },
    { id: "insights", label: "Insights", src: "insights.html" },
  ]
};
/* ===================================================================================== */

document.title = CONFIG.institution + " — " + CONFIG.product;
document.getElementById('institutionName').textContent = CONFIG.institution;
document.getElementById('productTag').textContent = CONFIG.product;
document.getElementById('releaseTag').textContent = CONFIG.release;

const tabsEl = document.getElementById('tabs');
CONFIG.tabs.forEach(t=>{
  const b = document.createElement('button');
  b.className = 'tab'; b.dataset.id = t.id; b.dataset.src = t.src;
  b.textContent = t.label;
  tabsEl.appendChild(b);
});

const tabs=[...document.querySelectorAll('.tab')];
const framesEl=document.getElementById('frames');
const loader=document.getElementById('loader');
const iframes={};

function activate(tab){
  if(!tab)return;
  tabs.forEach(t=>t.classList.remove('on'));
  tab.classList.add('on');
  const id=tab.dataset.id;

  if(!iframes[id]){
    loader.classList.remove('hidden');
    const f=document.createElement('iframe');
    f.src=tab.dataset.src;
    f.classList.add('hidden');
    f.onload=()=>{ loader.classList.add('hidden'); f.classList.remove('hidden'); };
    framesEl.appendChild(f);
    iframes[id]=f;
  } else {
    loader.classList.add('hidden');
  }

  Object.entries(iframes).forEach(([fid,f])=>f.classList.toggle('hidden', fid!==id));
  if(iframes[id].src && !iframes[id].classList.contains('hidden')){
    loader.classList.add('hidden');
  }

  location.hash=id;
}

tabs.forEach(t=>t.addEventListener('click',()=>activate(t)));

const startId=location.hash.slice(1);
activate(tabs.find(t=>t.dataset.id===startId)||tabs.find(t=>t.dataset.id===CONFIG.defaultTab));
</script>
